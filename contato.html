<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Car Office | Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="https://github.com/GabrielBarros100/Des-Web/blob/main/img8.png.jpeg?raw=true" alt="Logotipo Drive Car Office">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="produtos.html">Produtos</a></li>
                <li><a href="novidades.html">Novidades</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 style="text-align: center; margin-bottom: 2rem;">Fale Conosco</h1>
        
        <section class="form-container">
            <form action="#" method="POST">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="seuemail@empresa.com" required>

                <label for="assunto">Assunto:</label>
                <input type="text" id="assunto" name="assunto" placeholder="Ex: Cotação Carro">

                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="6" placeholder="Como podemos ajudar?" required></textarea>

                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>

        <section style="text-align: center; margin-top: 3rem;">
            <h3>Siga Nossas Redes Sociais</h3>
            <div style="margin-top: 1rem;">
                <a href="#" style="margin: 0 10px; color: black; font-weight: bold;">Instagram</a> | 
                <a href="#" style="margin: 0 10px; color: black; font-weight: bold;">Facebook</a> | 
                <a href="#" style="margin: 0 10px; color: black; font-weight: bold;">LinkedIn</a>
            </div>
            <p style="margin-top: 1rem; color: #666;">Empresas Parceiras: AutoLux & TechMotors</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Drive Car Office. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
